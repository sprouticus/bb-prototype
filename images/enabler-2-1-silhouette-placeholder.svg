<svg viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="ph-title ph-desc">
  <title id="ph-title">Placeholder silhouette</title>
  <desc id="ph-desc">Temporary placeholder standing in for the Enabler 2.1 shape teaser — not final artwork.</desc>
  <defs>
    <pattern id="hazard" width="28" height="28" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="28" height="28" fill="#0B3954"/>
      <rect width="14" height="28" fill="#0E4468"/>
    </pattern>
  </defs>

  <rect x="0" y="0" width="600" height="360" fill="url(#hazard)"/>
  <rect x="0" y="0" width="600" height="360" fill="#0B3954" fill-opacity="0.55"/>

  <!-- generic utility-vehicle silhouette, dashed to signal placeholder status -->
  <g fill="none" stroke="#6E97AE" stroke-width="3" stroke-dasharray="9 7" stroke-linejoin="round" stroke-linecap="round">
    <path d="M70 250
             L100 250
             L120 195
             L195 165
             L260 165
             L285 195
             L470 195
             L500 220
             L530 250
             L555 250" />
    <circle cx="165" cy="255" r="34" />
    <circle cx="455" cy="255" r="34" />
    <line x1="199" y1="255" x2="421" y2="255" />
  </g>

  <g font-family="'IBM Plex Mono', 'Courier New', monospace" text-anchor="middle">
    <text x="300" y="90" fill="#FFFFFF" font-size="20" font-weight="700" letter-spacing="2">PLACEHOLDER</text>
    <text x="300" y="116" fill="#B9C7CE" font-size="13" letter-spacing="1">FINAL ENABLER 2.1 SILHOUETTE COMING SOON</text>
    <text x="300" y="320" fill="#6E97AE" font-size="11" letter-spacing="1.5">SHAPE SHOWN IS ILLUSTRATIVE ONLY — NOT ACTUAL VEHICLE</text>
  </g>
</svg>
